# hi-vibe: pyproject.toml에 병합할 ruff 설정
# 갓펑션·과중첩·인자 폭발을 린트가 거부하게 한다 (d-3)

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = [
  "E",      # pycodestyle 오류
  "F",      # pyflakes (미사용 import/변수 등)
  "C901",   # 복잡도
  "PLR0913" # 인자 너무 많음
]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 5
